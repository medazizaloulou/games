<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متاهة النيون</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
color:white;
overflow:hidden;
background:#000;
}

/* خلفية Neon */
#bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(circle at 20% 20%, #00ffff, transparent 40%),
radial-gradient(circle at 80% 30%, #ff00ff, transparent 40%),
radial-gradient(circle at 50% 80%, #00ff9c, transparent 40%),
#050510;
animation:move 10s infinite alternate;
}

@keyframes move{
0%{background-position:20% 20%,80% 30%,50% 80%;}
100%{background-position:30% 40%,70% 20%,40% 70%;}
}

#info{
margin-bottom:10px;
font-size:18px;
text-shadow:0 0 10px cyan;
}

canvas{
background:rgba(0,0,0,0.6);
border-radius:15px;
box-shadow:0 0 20px cyan,0 0 40px magenta;
}

#controls{
margin-top:15px;
display:grid;
grid-template-columns:60px 60px 60px;
gap:10px;
}

button{
padding:12px;
font-size:20px;
border:none;
border-radius:10px;
background:cyan;
box-shadow:0 0 10px cyan;
cursor:pointer;
}

#gameOver{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>
</head>

<body>

<div id="bg"></div>

<div id="info">
🏆 <span id="level">1</span> |
🥇 <span id="best">1</span> |
⏳ <span id="time">30</span>
</div>

<canvas id="game"></canvas>

<div id="controls">
<div></div>
<button onclick="move(0,-1)">⬆️</button>
<div></div>

<button onclick="move(-1,0)">⬅️</button>
<div></div>
<button onclick="move(1,0)">➡️</button>

<div></div>
<button onclick="move(0,1)">⬇️</button>
<div></div>
</div>

<div id="gameOver">
<h1>💀 Game Over</h1>
<p id="finalLevel"></p>
<button onclick="retry()">إعادة</button>
<button onclick="resetGame()">من البداية</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let level=parseInt(localStorage.getItem("level"))||1
let best=parseInt(localStorage.getItem("best"))||1

document.getElementById("level").innerText=level
document.getElementById("best").innerText=best

let rows,cols,size,maze,player,exit,timeLeft,timer

// منع تحديث الصفحة بالسحب
document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false})

function generateMaze(){

rows=15+Math.floor(level/2)
cols=rows

if(rows%2==0) rows++
if(cols%2==0) cols++

maze=[]

for(let y=0;y<rows;y++){
maze[y]=[]
for(let x=0;x<cols;x++) maze[y][x]=1
}

function carve(x,y){
maze[y][x]=0
let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
dirs.sort(()=>Math.random()-0.5)

for(let d of dirs){
let nx=x+d[0]
let ny=y+d[1]

if(nx>0&&ny>0&&nx<cols-1&&ny<rows-1&&maze[ny][nx]==1){
maze[y+d[1]/2][x+d[0]/2]=0
carve(nx,ny)
}
}
}

carve(1,1)

player={x:1,y:1}
exit={x:cols-2,y:rows-2}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
if(maze[y][x]==1){
ctx.shadowColor="#00ffff"
ctx.shadowBlur=15
ctx.fillStyle="white"
ctx.fillRect(x*size,y*size,size,size)
}
}
}

// خروج
ctx.shadowBlur=30
ctx.fillStyle="lime"
ctx.fillRect(exit.x*size,exit.y*size,size,size)

// لاعب
ctx.shadowColor="cyan"
ctx.shadowBlur=30
ctx.fillStyle="cyan"
ctx.fillRect(player.x*size,player.y*size,size,size)
}

// ⭐ الحركة الانزلاقية
let moving=false

function move(dx,dy){

if(moving) return
moving=true

let interval=setInterval(()=>{

let nx=player.x+dx
let ny=player.y+dy

if(nx<0||ny<0||nx>=cols||ny>=rows||maze[ny][nx]==1){
clearInterval(interval)
moving=false
return
}

player.x=nx
player.y=ny

draw()

// تأثير Neon
ctx.fillStyle="rgba(0,255,255,0.2)"
ctx.fillRect(player.x*size-5,player.y*size-5,size+10,size+10)

if(player.x==exit.x&&player.y==exit.y){
clearInterval(interval)
moving=false
nextLevel()
}

},40)
}

function nextLevel(){
level++

if(level>best){
best=level
localStorage.setItem("best",best)
document.getElementById("best").innerText=best
}

document.getElementById("level").innerText=level
localStorage.setItem("level",level)

// وميض Neon
let op=1
let flash=setInterval(()=>{
draw()
ctx.fillStyle=`rgba(0,255,255,${op})`
ctx.fillRect(0,0,canvas.width,canvas.height)
op-=0.1
if(op<=0){
clearInterval(flash)
startLevel()
}
},30)
}

function resize(){
let s=Math.min(window.innerWidth,window.innerHeight-150)
canvas.width=s
canvas.height=s
if(cols) size=canvas.width/cols
draw()
}
window.addEventListener("resize",resize)

function startLevel(){
generateMaze()
resize()

timeLeft=30
document.getElementById("time").innerText=timeLeft

clearInterval(timer)

timer=setInterval(()=>{
timeLeft--
document.getElementById("time").innerText=timeLeft
if(timeLeft<=0) gameOver()
},1000)
}

function gameOver(){
clearInterval(timer)
document.getElementById("gameOver").style.display="flex"
document.getElementById("finalLevel").innerText="وصلت للمرحلة "+level
}

function retry(){
document.getElementById("gameOver").style.display="none"
startLevel()
}

function resetGame(){
localStorage.removeItem("level")
level=1
document.getElementById("level").innerText=level
document.getElementById("gameOver").style.display="none"
startLevel()
}

// كيبورد
document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp") move(0,-1)
if(e.key=="ArrowDown") move(0,1)
if(e.key=="ArrowLeft") move(-1,0)
if(e.key=="ArrowRight") move(1,0)
})

// Swipe
let sx,sy
canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX
sy=e.touches[0].clientY
},{passive:true})

canvas.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-sx
let dy=e.changedTouches[0].clientY-sy

if(Math.abs(dx)>Math.abs(dy)){
if(dx>30) move(1,0)
else if(dx<-30) move(-1,0)
}else{
if(dy>30) move(0,1)
else if(dy<-30) move(0,-1)
}
},{passive:true})

startLevel()

</script>

</body>
</html>
